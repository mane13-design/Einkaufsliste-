<!DOCTYPE html>
<html lang="de">
<head> <link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einkaufsliste</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
  margin: 0;
}

.app {
  padding: 20px;
}

h1 {
  font-size: 26px;
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #f2f2f7;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

.add {
  background: #007aff;
  color: white;
}

.share {
  background: #34c759;
  color: white;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

li {
  background: white;
  margin-top: 8px;
  padding: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
}

li.checked {
  text-decoration: line-through;
  opacity: 0.5;
}

.category {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 8px;
  background: #e5e5ea;
}
</style>
</head>

<body>

<div class="app">
  <h1>🛒 Einkaufsliste</h1>

  <div class="card">
    <input id="input" placeholder="Produkt hinzufügen">

    <select id="category">
      <option>Allgemein</option>
      <option>Obst & Gemüse</option>
      <option>Getränke</option>
      <option>Drogerie</option>
      <option>Fleisch</option>
    </select>

    <button class="add" onclick="addItem()">Hinzufügen</button>
    <button class="share" onclick="shareList()">Teilen</button>

    <ul id="list"></ul>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("list")) || [];

function save() {
  localStorage.setItem("list", JSON.stringify(items));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, i) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span>${item.text}</span>
      <span class="category">${item.category}</span>
    `;

    if (item.checked) li.classList.add("checked");

    li.onclick = () => {
      items[i].checked = !items[i].checked;
      save();
      render();
      if (navigator.vibrate) navigator.vibrate(50);
    };

    list.appendChild(li);
  });
}

function addItem() {
  const text = document.getElementById("input").value;
  const category = document.getElementById("category").value;

  if (!text) return;

  items.push({ text, category, checked: false });

  document.getElementById("input").value = "";

  save();
  render();
}

function shareList() {
  const text = items.map(i => 
    `${i.checked ? "✓" : "•"} ${i.text}`
  ).join("\n");

  navigator.share ? navigator.share({ text }) : alert(text);
}

render();
</script>

</body>
</html>
